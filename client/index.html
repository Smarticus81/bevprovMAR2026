    <title>BevPro</title>
    <script>
      (function() {
        var t = localStorage.getItem('bevpro-theme');
        // Default to dark mode — only remove dark class if explicitly set to light
        if (t === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
